<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Hybrid Quoter</title>
    
    <!-- React, ReactDOM, Babel, Tailwind CSS, and html2pdf -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Prevent auto-zoom on iOS Safari */
        input[type="text"], input[type="number"], select {
            font-size: 16px !important;
        }
        /* Add padding for main content to clear the fixed bottom nav */
        .pb-content { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 120px); }
        /* Add safe area padding specifically for the bottom nav */
        .pb-nav { padding-bottom: env(safe-area-inset-bottom, 0px); }
        
        /* Print Styles for PDF Generation & Native Print/Screenshot */
        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .print-full-width { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
            /* Force background colors to print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        /* Hide arrows on number inputs for cleaner look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                scissors: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>,
                printer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
                user: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                shirt: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>,
                calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                fileText: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
                layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                eye: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
                download: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                save: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
                upload: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            };
            return icons[name] || null;
        };

        // --- PRICING LOGIC ---
        const STITCH_MATRIX = [
            { maxStitch: 8000, prices: [15, 15, 14.5, 14.5, 14] },
            { maxStitch: 15000, prices: [22.5, 22, 21, 21, 20] },
            { maxStitch: 20000, prices: [30, 28, 27, 27, 25] },
            { maxStitch: Infinity, prices: [50, 45, 43, 43, 40] }
        ];

        const QTY_TIERS = [
            { max: 10, index: 0 }, { max: 49, index: 1 }, { max: 100, index: 2 },
            { max: 299, index: 3 }, { max: Infinity, index: 4 }
        ];

        const getEmbroideryCostPerPiece = (stitches, qty) => {
            if (!stitches || stitches <= 0) return 0;
            const sRow = STITCH_MATRIX.find(r => stitches <= r.maxStitch) || STITCH_MATRIX[STITCH_MATRIX.length - 1];
            const qCol = QTY_TIERS.find(q => qty <= q.max) || QTY_TIERS[QTY_TIERS.length - 1];
            return sRow.prices[qCol.index];
        };

        const DTF_SIZES = [
            { id: 'small', label: 'Small / Left Chest (4"x4")' },
            { id: 'medium', label: 'Mid-size / Youth (8"x8")' },
            { id: 'sleeve', label: 'Sleeve / Long Strip' },
            { id: 'large', label: 'Standard Full Back (11"x11")' },
            { id: 'xlarge', label: 'Oversized (13"x16")' }
        ];

        const SIZES_LIST = ['S', 'M', 'L', 'XL', '2X', '3X', '4X', '5X'];

        const DTF_PRIMARY_FEES = { small: 11.33, medium: 16.00, sleeve: 19.50, large: 22.00, xlarge: 28.00 };
        const DTF_SECONDARY_FEES = { small: 4.50, medium: 8.00, sleeve: 10.50, large: 12.00, xlarge: 15.00 };
        
        const DTF_MATERIAL_COSTS = { 
            small: 0.67,
            medium: 2.67,
            sleeve: 1.75,
            large: 5.04,
            xlarge: 8.67
        };

        const genId = () => Math.random().toString(36).substr(2, 9);
        const formatCurrency = (val) => '$' + (val || 0).toFixed(2);

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('build');

            // Order-Level State
            const [orderData, setOrderData] = useState({
                customerName: '', orderName: '', dateRequired: '', orderDescription: '',
                setupFees: '', digitizingFee: '', digitizingCost: '', taxRate: 5, discount: '', machineReservePercent: '5' 
            });

            // Line Items State
            const [items, setItems] = useState([
                {
                    id: genId(), name: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35,
                    sizes: { S: '', M: '', L: '', XL: '', '2X': '', '3X': '', '4X': '', '5X': '' },
                    locations: [ { id: genId(), type: 'none', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ]
                }
            ]);

            const updateOrder = (field, value) => setOrderData(prev => ({ ...prev, [field]: value }));

            const updateItem = (itemId, field, value) => {
                setItems(items.map(item => item.id === itemId ? { ...item, [field]: value } : item));
            };

            const updateSize = (itemId, sizeKey, value) => {
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        return { ...item, sizes: { ...item.sizes, [sizeKey]: value } };
                    }
                    return item;
                }));
            };

            const addLocation = (itemId) => {
                setItems(items.map(item => item.id === itemId ? 
                    { ...item, locations: [...item.locations, { id: genId(), type: 'none', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' }] } : item));
            };

            const updateLocation = (itemId, locId, field, value) => {
                setItems(items.map(item => item.id === itemId ? 
                    { ...item, locations: item.locations.map(loc => loc.id === locId ? { ...loc, [field]: value } : loc) } : item));
            };

            const removeLocation = (itemId, locId) => {
                setItems(items.map(item => item.id === itemId ? 
                    { ...item, locations: item.locations.filter(loc => loc.id !== locId) } : item));
            };

            const addItem = () => {
                setItems([...items, {
                    id: genId(), name: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35,
                    sizes: { S: '', M: '', L: '', XL: '', '2X': '', '3X': '', '4X': '', '5X': '' },
                    locations: [ { id: genId(), type: 'none', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ]
                }]);
            };

            const removeItem = (itemId) => {
                if(items.length > 1) setItems(items.filter(item => item.id !== itemId));
            };

            const handlePrint = (viewType) => {
                if (window.html2pdf) {
                    const elementId = viewType === 'internal' ? 'internal-view' : 'proposal-view';
                    const element = document.getElementById(elementId);
                    
                    const noPrintElements = element.querySelectorAll('.no-print');
                    noPrintElements.forEach(el => el.style.display = 'none');

                    const customerFileName = orderData.customerName ? orderData.customerName.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'customer';
                    const suffix = viewType === 'internal' ? 'internal_breakdown' : 'proposal';
                    
                    const opt = {
                        margin:       0.5,
                        filename:     `${customerFileName}_${suffix}.pdf`,
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true },
                        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                    };

                    window.html2pdf().set(opt).from(element).save().then(() => {
                        noPrintElements.forEach(el => el.style.display = '');
                    });
                } else {
                    window.print();
                }
            };

            // File input reference
            const fileInputRef = useRef(null);

            // Export to JSON
            const handleExport = () => {
                const dataToSave = { orderData, items };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const fileName = orderData.customerName 
                    ? `${orderData.customerName.replace(/[^a-z0-9]/gi, '_')}_Quote.json` 
                    : 'Quote_Export.json';
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // Import from JSON
            const handleImport = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData.orderData && importedData.items) {
                            setOrderData(importedData.orderData);
                            setItems(importedData.items);
                            alert('Quote loaded successfully!');
                        } else {
                            alert('Invalid file format. Missing quote data.');
                        }
                    } catch (error) {
                        alert('Error reading file. Please ensure it is a valid quote file.');
                    }
                };
                reader.readAsText(file);
                event.target.value = null; // Reset input
            };

            const calc = useMemo(() => {
                let orderGarmentCostTotal = 0;
                let orderGarmentRetailTotal = 0;
                let orderDecoRetailTotal = 0;
                let orderDecoCostTotal = 0;
                
                let totalDtfCost = 0;
                let totalThreadCost = 0;
                let totalStabilizerCost = 0;
                
                const processedItems = items.map(item => {
                    const sizeSum = SIZES_LIST.reduce((sum, size) => sum + Math.max(0, parseInt(item.sizes?.[size]) || 0), 0);
                    const calculatedQty = sizeSum > 0 ? sizeSum : Math.max(1, parseInt(item.qty) || 1);
                    
                    const rawCost = parseFloat(item.rawCost) || 0;
                    const shipping = parseFloat(item.shippingCost) || 0;
                    const margin = parseFloat(item.margin) || 0;
                    
                    const landedCost = rawCost + shipping;
                    const effectiveMargin = Math.min(margin, 99.9);
                    const clientGarmentPrice = landedCost / (1 - (effectiveMargin / 100));
                    
                    let dtfCount = 0;
                    let itemDecoPerPiece = 0;
                    let itemDecoCostPerPiece = 0;
                    
                    let itemDtfCost = 0;
                    let itemThreadCost = 0;
                    let itemStabilizerCost = 0;
                    
                    const processedLocations = item.locations.map(loc => {
                        let baseCost = 0;
                        let matCost = 0;
                        if (loc.type === 'embroidery') {
                            baseCost = getEmbroideryCostPerPiece(parseInt(loc.stitches) || 0, calculatedQty);
                            if (loc.isPuff) {
                                baseCost += parseFloat(loc.puffMarkup) || 0;
                            }
                            let stabCost = 1.00;
                            let threadCost = ((parseInt(loc.stitches) || 0) / 2500);
                            matCost = stabCost + threadCost;
                            
                            itemStabilizerCost += stabCost;
                            itemThreadCost += threadCost;
                        } else if (loc.type === 'dtf') {
                            dtfCount++;
                            baseCost = dtfCount === 1 ? (DTF_PRIMARY_FEES[loc.dtfSize] || 0) : (DTF_SECONDARY_FEES[loc.dtfSize] || 0);
                            matCost = DTF_MATERIAL_COSTS[loc.dtfSize] || 0;
                            
                            itemDtfCost += matCost;
                        }
                        
                        let adjustmentCost = parseFloat(loc.adjustment) || 0;
                        let cost = Math.max(0, baseCost + adjustmentCost);
                        let locDiscount = adjustmentCost < 0 ? Math.abs(adjustmentCost) : 0;
                        
                        itemDecoPerPiece += cost;
                        itemDecoCostPerPiece += matCost;
                        return { ...loc, baseCost, cost, materialCost: matCost, locDiscount, isFirstDtf: loc.type === 'dtf' && dtfCount === 1 };
                    });
                    
                    const totalGarmentCost = landedCost * calculatedQty;
                    const totalGarmentRetail = clientGarmentPrice * calculatedQty;
                    const totalDecoRetail = itemDecoPerPiece * calculatedQty;
                    const totalDecoMaterialCost = itemDecoCostPerPiece * calculatedQty;
                    
                    const validLocations = item.locations.filter(l => l.type !== 'none');
                    const validPlacementCount = validLocations.length;
                    
                    const itemDecoDiscountPerPiece = processedLocations.reduce((sum, l) => sum + l.locDiscount, 0);
                    const itemTotalDecoDiscount = itemDecoDiscountPerPiece * calculatedQty;
                    
                    const lineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece;
                    const lineTotal = lineTotalPerPiece * calculatedQty;
                    const garmentProfit = totalGarmentRetail - totalGarmentCost;
                    
                    orderGarmentCostTotal += totalGarmentCost;
                    orderGarmentRetailTotal += totalGarmentRetail;
                    orderDecoRetailTotal += totalDecoRetail;
                    orderDecoCostTotal += totalDecoMaterialCost;
                    
                    totalDtfCost += itemDtfCost * calculatedQty;
                    totalThreadCost += itemThreadCost * calculatedQty;
                    totalStabilizerCost += itemStabilizerCost * calculatedQty;

                    return {
                        ...item, calculatedQty, sizeSum, landedCost, clientGarmentPrice, processedLocations, validPlacementCount,
                        itemDecoPerPiece, itemDecoCostPerPiece, itemTotalDecoDiscount, totalGarmentCost, totalGarmentRetail, totalDecoRetail, 
                        lineTotalPerPiece, lineTotal, garmentProfit
                    };
                });

                const setup = parseFloat(orderData.setupFees) || 0;
                const digitizing = parseFloat(orderData.digitizingFee) || 0;
                const digitizingCost = parseFloat(orderData.digitizingCost) || 0;
                const discount = parseFloat(orderData.discount) || 0;
                const taxRate = parseFloat(orderData.taxRate) || 0;
                
                const totalDecoDiscount = processedItems.reduce((sum, item) => sum + item.itemTotalDecoDiscount, 0);
                const totalSavingsDisplay = totalDecoDiscount + discount;
                
                const subtotal = orderGarmentRetailTotal + orderDecoRetailTotal + setup + digitizing;
                const discountedSubtotal = Math.max(0, subtotal - discount);
                const tax = discountedSubtotal * (taxRate / 100);
                const grandTotal = discountedSubtotal + tax;
                
                let reservePercent = 5;
                if (orderData.machineReservePercent !== undefined && orderData.machineReservePercent !== '') {
                    reservePercent = parseFloat(orderData.machineReservePercent);
                    if (isNaN(reservePercent)) reservePercent = 0;
                }
                const machineReserve = discountedSubtotal * (reservePercent / 100);
                
                const totalRestockAndMachineFund = orderDecoCostTotal + machineReserve;
                const totalOrderCost = orderGarmentCostTotal + totalRestockAndMachineFund + digitizingCost;
                
                const grossProfit = discountedSubtotal - orderGarmentCostTotal;
                const netProfit = grossProfit - orderDecoCostTotal - machineReserve - digitizingCost;
                
                const totalMarginPercent = discountedSubtotal > 0 ? (netProfit / discountedSubtotal) * 100 : 0;
                const isProfitable = netProfit > 0;
                
                return {
                    items: processedItems,
                    orderGarmentCostTotal, orderGarmentRetailTotal, orderDecoRetailTotal, orderDecoCostTotal,
                    totalDtfCost, totalThreadCost, totalStabilizerCost,
                    setup, digitizing, digitizingCost, discount, reservePercent, machineReserve, subtotal, discountedSubtotal, tax, grandTotal,
                    totalRestockAndMachineFund, totalOrderCost, grossProfit, netProfit, totalMarginPercent, isProfitable, totalSavingsDisplay,
                    deposit: Math.ceil(grandTotal) / 2
                };
            }, [items, orderData]);

            const getSizeString = (item) => {
                const activeSizes = SIZES_LIST.filter(s => (parseInt(item.sizes?.[s]) || 0) > 0);
                if (activeSizes.length === 0) return null;
                return activeSizes.map(s => `${s}: ${item.sizes[s]}`).join(', ');
            };

            const renderBuildTab = () => (
                <div className="space-y-6 pb-20 no-print">
                    {/* Order Details */}
                    <div className="bg-white rounded-xl shadow-sm p-5 border border-slate-200">
                        <h2 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2 uppercase tracking-wider">
                            <Icon name="user" size={18} className="text-indigo-500" /> Order Details
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" placeholder="Customer / Company Name"
                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                value={orderData.customerName} onChange={e => updateOrder('customerName', e.target.value)} />
                            <input type="text" placeholder="Order Name (e.g. Summer Staff Gear)"
                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                value={orderData.orderName} onChange={e => updateOrder('orderName', e.target.value)} />
                            <input type="text" placeholder="Date Required"
                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                value={orderData.dateRequired} onChange={e => updateOrder('dateRequired', e.target.value)} />
                            <div className="md:col-span-2">
                                <textarea placeholder="Job Description (Visible on Proposal)"
                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none"
                                    rows="2"
                                    value={orderData.orderDescription} onChange={e => updateOrder('orderDescription', e.target.value)}></textarea>
                            </div>
                        </div>
                    </div>

                    {/* Line Items List */}
                    {calc.items.map((item, index) => (
                        <div key={item.id} className="bg-white rounded-xl shadow-sm border border-slate-300 overflow-hidden">
                            <div className="bg-slate-800 text-white p-4 flex justify-between items-center">
                                <h3 className="font-bold flex items-center gap-2">
                                    <Icon name="shirt" size={18} /> Garment Style {index + 1}
                                </h3>
                                {items.length > 1 && (
                                    <button onClick={() => removeItem(item.id)} className="text-slate-400 hover:text-red-400 transition-colors p-1">
                                        <Icon name="trash" size={18} />
                                    </button>
                                )}
                            </div>
                            
                            <div className="p-5">
                                <div className="flex flex-col gap-4 mb-5">
                                    <div className="flex flex-col md:flex-row gap-4">
                                        <div className="flex-[3]">
                                            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">Item Description</label>
                                            <input type="text" placeholder="e.g. Gildan 5000 Black"
                                                className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium"
                                                value={item.name} onChange={e => updateItem(item.id, 'name', e.target.value)} />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase">Total Qty</label>
                                            <input type="number" placeholder="1"
                                                className={`w-full p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold ${item.sizeSum > 0 ? 'bg-slate-200 text-slate-500 cursor-not-allowed border-transparent' : 'bg-slate-50 text-indigo-700 border border-slate-200'}`}
                                                value={item.sizeSum > 0 ? item.sizeSum : item.qty} 
                                                readOnly={item.sizeSum > 0}
                                                onFocus={(e) => !item.sizeSum && e.target.select()}
                                                onChange={e => updateItem(item.id, 'qty', e.target.value)} />
                                        </div>
                                    </div>
                                    
                                    <div className="mt-1">
                                        <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Size Breakdown (Optional - Overrides Total Qty)</label>
                                        <div className="flex gap-1 overflow-x-auto pb-1 scrollbar-hide">
                                            {SIZES_LIST.map(size => (
                                                <div key={size} className="flex-1 min-w-[2.5rem]">
                                                    <div className="text-[9px] text-center text-slate-500 font-bold mb-1">{size}</div>

                                                        className="w-full p-1.5 text-center bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 outline-none font-semibold text-slate-700"
                                                        value={item.sizes?.[size] || ''}
                                                        onFocus={e => e.target.select()}
                                                        onChange={e => updateSize(item.id, size, e.target.value)} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-3 bg-slate-50 p-3 rounded-lg border border-slate-100 mb-5">
                                    <div>
                                        <label className="block text-[10px] font-semibold text-slate-500 mb-1 uppercase">Wholesale ($)</label>
                                        <input type="number" placeholder="0.00"
                                            className="w-full p-2 bg-white border border-slate-200 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                            value={item.rawCost} 
                                            onFocus={(e) => e.target.select()}
                                            onChange={e => updateItem(item.id, 'rawCost', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-semibold text-slate-500 mb-1 uppercase">Freight ($)</label>
                                        <input type="number" placeholder="1.00"
                                            className="w-full p-2 bg-white border border-slate-200 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                            value={item.shippingCost} 
                                            onFocus={(e) => e.target.select()}
                                            onChange={e => updateItem(item.id, 'shippingCost', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-semibold text-slate-500 mb-1 uppercase">Margin (%)</label>
                                        <input type="number" placeholder="35"
                                            className="w-full p-2 bg-white border border-slate-200 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                            value={item.margin} 
                                            onFocus={(e) => e.target.select()}
                                            onChange={e => updateItem(item.id, 'margin', e.target.value)} />
                                    </div>
                                </div>

                                <div className="pt-2 border-t border-slate-100">
                                    <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Decoration Locations</h4>
                                    
                                    {item.processedLocations.map((loc, lIdx) => (
                                        <div key={loc.id} className="relative bg-white border-2 border-slate-100 rounded-lg p-3 mb-3 hover:border-indigo-100 transition-colors">
                                            {item.locations.length > 1 && (
                                                <button onClick={() => removeLocation(item.id, loc.id)} className="absolute top-2 right-2 text-slate-300 hover:text-red-500">
                                                    <Icon name="trash" size={16} />
                                                </button>
                                            )}
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2 pr-6">
                                                <div>
                                                    <label className="block text-[10px] text-slate-500 mb-1">Type</label>
                                                    <select className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500"
                                                        value={loc.type} onChange={e => updateLocation(item.id, loc.id, 'type', e.target.value)}>
                                                        <option value="none">None</option>
                                                        <option value="embroidery">🧵 Embroidery</option>
                                                        <option value="dtf">🖨️ DTF Print</option>
                                                    </select>
                                                </div>
                                                
                                                {loc.type === 'embroidery' && (
                                                    <div>
                                                        <label className="block text-[10px] text-slate-500 mb-1">Est. Stitches</label>
                                                        <input type="number" placeholder="e.g. 10000"
                                                            className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500"
                                                            value={loc.stitches} 
                                                            onFocus={(e) => e.target.select()}
                                                            onChange={e => updateLocation(item.id, loc.id, 'stitches', e.target.value)} />
                                                            
                                                        <div className="mt-2 flex items-center justify-between bg-slate-100 p-1.5 rounded border border-slate-200">
                                                            <div className="flex items-center gap-2">
                                                                <input type="checkbox" id={`puff-${loc.id}`} checked={loc.isPuff} onChange={e => updateLocation(item.id, loc.id, 'isPuff', e.target.checked)} className="rounded text-indigo-600" />
                                                                <label htmlFor={`puff-${loc.id}`} className="text-[10px] text-slate-700 font-semibold cursor-pointer">Puff / 3D</label>
                                                            </div>
                                                            {loc.isPuff && (
                                                                <div className="flex items-center gap-1">
                                                                    <span className="text-[10px] text-slate-500">+$</span>
                                                                    <input type="number" value={loc.puffMarkup} 
                                                                        onFocus={(e) => e.target.select()}
                                                                        onChange={e => updateLocation(item.id, loc.id, 'puffMarkup', e.target.value)} className="w-12 p-1 pl-1 text-[10px] border rounded outline-none" />
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {loc.type === 'dtf' && (
                                                    <div>
                                                        <label className="block text-[10px] text-slate-500 mb-1">Size {loc.isFirstDtf ? '(Primary Price)' : '(Secondary Price)'}</label>
                                                        <select className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500"
                                                            value={loc.dtfSize} onChange={e => updateLocation(item.id, loc.id, 'dtfSize', e.target.value)}>
                                                            {DTF_SIZES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                                                        </select>
                                                    </div>
                                                )}
                                            </div>

                                            {loc.type !== 'none' && (
                                                <div className="grid grid-cols-12 gap-3 mt-2">
                                                    <div className="col-span-8 md:col-span-9">
                                                        <label className="block text-[10px] text-slate-500 mb-1">Description / Notes</label>
                                                        <input type="text" placeholder="e.g. Left Chest Logo (Red/White)"
                                                            className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500"
                                                            value={loc.desc} onChange={e => updateLocation(item.id, loc.id, 'desc', e.target.value)} />
                                                    </div>
                                                    <div className="col-span-4 md:col-span-3">
                                                        <label className="block text-[10px] text-slate-500 mb-1">Adj (+/- $)</label>
                                                        <input type="number" placeholder="0.00"
                                                            className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500"
                                                            value={loc.adjustment}
                                                            onFocus={(e) => e.target.select()}
                                                            onChange={e => updateLocation(item.id, loc.id, 'adjustment', e.target.value)} />
                                                    </div>
                                                </div>
                                            )}

                                            {loc.type !== 'none' && (
                                                <div className="mt-3 text-right flex items-center justify-end gap-2">
                                                    {(parseFloat(loc.adjustment) !== 0 && !isNaN(parseFloat(loc.adjustment))) && (
                                                        <span className="text-[10px] font-medium text-slate-400 line-through">Base: {formatCurrency(loc.baseCost)}</span>
                                                    )}
                                                    <span className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">+{formatCurrency(loc.cost)}/ea</span>
                                                </div>
                                            )}
                                        </div>
                                    ))}

                                    <button onClick={() => addLocation(item.id)} className="w-full py-2 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 font-semibold text-sm hover:border-indigo-400 hover:text-indigo-600 transition-colors flex items-center justify-center gap-2">
                                        <Icon name="plus" size={16} /> Add Location
                                    </button>
                                </div>
                                
                                <div className="mt-4 bg-slate-800 text-white rounded-lg shadow-inner overflow-hidden">
                                    <div className="flex text-xs text-slate-300 bg-slate-800/80 p-3 border-b border-slate-700/50">
                                        <div className="flex-1 text-center border-r border-slate-700/50">
                                            <div className="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">Garment</div>
                                            <div className="font-semibold">{formatCurrency(item.landedCost)}</div>
                                        </div>
                                        <div className="flex flex-col justify-center px-2 text-slate-500 text-[10px] font-black">+</div>
                                        <div className="flex-1 text-center border-r border-slate-700/50">
                                            <div className="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">Markup</div>
                                            <div className="font-semibold">{formatCurrency(item.clientGarmentPrice - item.landedCost)}</div>
                                        </div>
                                        <div className="flex flex-col justify-center px-2 text-slate-500 text-[10px] font-black">+</div>
                                        <div className="flex-1 text-center">
                                            <div className="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">Decoration</div>
                                            <div className="font-semibold">{formatCurrency(item.itemDecoPerPiece)}</div>
                                        </div>
                                    </div>
                                    <div className="p-3 flex justify-between items-center bg-slate-900">
                                        <span className="text-slate-400 font-bold uppercase tracking-wider text-xs">Total Price Per Item</span>
                                        <span className="text-emerald-400 font-black text-xl">{formatCurrency(item.lineTotalPerPiece)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ))}

                    <button onClick={addItem} className="w-full py-4 bg-indigo-100 text-indigo-700 rounded-xl font-bold hover:bg-indigo-200 transition-colors flex items-center justify-center gap-2 shadow-sm">
                        <Icon name="plus" size={20} /> Add Another Garment Style
                    </button>

                    <div className="bg-white rounded-xl shadow-sm p-5 border border-slate-200">
                        <h2 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2 uppercase tracking-wider">
                            <Icon name="calculator" size={18} className="text-indigo-500" /> Fees & Discounts
                        </h2>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                            <div>
                                <label className="block text-xs text-slate-500 mb-1">Setup Fees ($)</label>
                                <input type="number" placeholder="0.00"
                                    className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                    value={orderData.setupFees} 
                                    onFocus={(e) => e.target.select()}
                                    onChange={e => updateOrder('setupFees', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1">Digitizing Fee ($)</label>
                                <input type="number" placeholder="0.00"
                                    className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                    value={orderData.digitizingFee} 
                                    onFocus={(e) => e.target.select()}
                                    onChange={e => updateOrder('digitizingFee', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-[11px] font-bold text-rose-500 mb-1 uppercase">Outsourced Cost ($)</label>
                                <input type="number" placeholder="0.00"
                                    className="w-full p-2.5 bg-rose-50 border border-rose-200 rounded-lg focus:ring-2 focus:ring-rose-500 outline-none text-sm text-rose-900"
                                    value={orderData.digitizingCost} 
                                    onFocus={(e) => e.target.select()}
                                    onChange={e => updateOrder('digitizingCost', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1">Discount ($)</label>
                                <input type="number" placeholder="0.00"
                                    className="w-full p-2.5 bg-amber-50 border border-amber-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm text-amber-900"
                                    value={orderData.discount} 
                                    onFocus={(e) => e.target.select()}
                                    onChange={e => updateOrder('discount', e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1">Tax Rate (%)</label>
                                <input type="number" placeholder="5"
                                    className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                                    value={orderData.taxRate} 
                                    onFocus={(e) => e.target.select()}
                                    onChange={e => updateOrder('taxRate', e.target.value)} />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderInternalTab = () => (
                <div id="internal-view" className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden print-no-shadow print-full-width">
                    <div className="bg-slate-900 text-white p-6 relative">
                        <div className="no-print absolute top-6 right-6 flex items-center gap-2">
                            {/* Hidden file input */}
                            <input 
                                type="file" 
                                accept=".json,application/json" 
                                style={{ display: 'none' }} 
                                ref={fileInputRef}
                                onChange={handleImport}
                            />
                            
                            <button onClick={() => fileInputRef.current && fileInputRef.current.click()} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                <Icon name="upload" size={16} /> Load
                            </button>
                            
                            <button onClick={handleExport} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                <Icon name="save" size={16} /> Save
                            </button>

                            <div className="w-px h-6 bg-slate-600 mx-1"></div> {/* Divider */}

                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                <Icon name="printer" size={16} /> Print
                            </button>
                            
                            <button onClick={() => handlePrint('internal')} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                <Icon name="download" size={16} /> PDF
                            </button>
                        </div>
                        <h2 className="text-2xl font-black uppercase tracking-widest">Internal Breakdown</h2>
                        <p className="text-slate-400 text-sm mt-1">{orderData.customerName || 'Customer'} - {orderData.orderName || 'Order'}</p>
                    </div>
                    <div className="p-6">
                        
                        {/* Profit Dashboard */}
                        <div className="bg-slate-900 rounded-3xl p-6 md:p-8 text-white shadow-xl relative overflow-hidden mb-6">
                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-emerald-500/10 rounded-full blur-3xl"></div>
                            
                            <div className="flex flex-col md:flex-row gap-8 items-center relative z-10">
                                <div className="w-full md:w-1/2">
                                    <p className="text-emerald-400 text-[10px] uppercase font-extrabold tracking-[0.2em] mb-2">Final Take-Home Profit</p>
                                    <div className="flex items-center gap-3 mb-4">
                                        <span className="text-5xl font-black tracking-tight">{formatCurrency(calc.netProfit)}</span>
                                        {calc.isProfitable ? (
                                            <span className="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-xs rounded-full font-bold uppercase tracking-wider">Profitable</span>
                                        ) : (
                                            <span className="px-3 py-1 bg-red-500/20 text-red-400 text-xs rounded-full font-bold uppercase tracking-wider">Loss</span>
                                        )}
                                    </div>
                                    
                                    <div className="bg-slate-800/50 rounded-xl p-3 border border-white/5 max-w-sm">
                                        <div className="flex justify-between items-center mb-1.5">
                                            <span className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Gross Profit</span>
                                            <span className="text-xs font-bold text-slate-200">{formatCurrency(calc.grossProfit)}</span>
                                        </div>
                                        <div className="flex justify-between items-center mb-1.5">
                                            <span className="text-[10px] text-amber-400/80 uppercase tracking-wider font-semibold">Recommended Savings</span>
                                            <span className="text-xs font-bold text-amber-400/80">-{formatCurrency(calc.machineReserve)}</span>
                                        </div>
                                        <div className={`flex justify-between items-center ${calc.digitizingCost > 0 ? 'mb-1.5' : 'mb-2 pb-2 border-b border-white/5'}`}>
                                            <span className="text-[10px] text-rose-400/80 uppercase tracking-wider font-semibold">Consumable Cost</span>
                                            <span className="text-xs font-bold text-rose-400/80">-{formatCurrency(calc.orderDecoCostTotal)}</span>
                                        </div>
                                        {calc.digitizingCost > 0 && (
                                            <div className="flex justify-between items-center mb-2 pb-2 border-b border-white/5">
                                                <span className="text-[10px] text-rose-400/80 uppercase tracking-wider font-semibold">Outsourced Digitizing</span>
                                                <span className="text-xs font-bold text-rose-400/80">-{formatCurrency(calc.digitizingCost)}</span>
                                            </div>
                                        )}
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] text-emerald-400 uppercase tracking-wider font-bold">Profit After Savings</span>
                                            <span className="text-xs font-black text-emerald-400">{formatCurrency(calc.netProfit)}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="w-full md:w-1/2 bg-white/5 border border-white/10 rounded-2xl p-5">
                                    <div className="flex justify-between items-center mb-4">
                                        <p className="text-slate-400 text-xs uppercase font-bold tracking-wider">Total Margin</p>
                                        <span className="text-xl font-bold text-white">{calc.totalMarginPercent.toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full bg-slate-800 rounded-full h-2 mb-4">
                                        <div className={`h-2 rounded-full ${calc.totalMarginPercent >= 40 ? 'bg-emerald-400' : calc.totalMarginPercent > 20 ? 'bg-amber-400' : 'bg-red-400'}`} style={{ width: `${Math.min(100, Math.max(0, calc.totalMarginPercent))}%` }}></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] text-slate-400 uppercase font-bold">
                                        <span>Revenue: {formatCurrency(calc.discountedSubtotal)}</span>
                                        <span>Cost: {formatCurrency(calc.totalOrderCost)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Restock & Machine Maintenance Fund Dashboard */}
                        <div className="bg-slate-50 rounded-2xl p-5 md:p-6 border border-slate-200 mb-8 shadow-sm">
                            <h3 className="text-sm font-bold text-slate-800 border-b border-slate-200 pb-3 mb-4 uppercase tracking-wider flex items-center gap-2">
                                <Icon name="calculator" size={18} className="text-indigo-500" /> Restock & Machine Fund
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between">
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Consumables Cost</p>
                                        <p className="text-xl font-bold text-slate-800">{formatCurrency(calc.orderDecoCostTotal)}</p>
                                    </div>
                                    <div className="mt-3 pt-3 border-t border-slate-100 space-y-1.5">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-semibold text-slate-500">DTF Transfers</span>
                                            <span className="text-[10px] font-bold text-slate-700">{formatCurrency(calc.totalDtfCost)}</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-semibold text-slate-500">Emb Thread</span>
                                            <span className="text-[10px] font-bold text-slate-700">{formatCurrency(calc.totalThreadCost)}</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-semibold text-slate-500">Emb Stabilizer</span>
                                            <span className="text-[10px] font-bold text-slate-700">{formatCurrency(calc.totalStabilizerCost)}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-500">
                                    <div className="flex justify-between items-center mb-1">
                                        <p className="text-[10px] text-indigo-500 uppercase font-bold tracking-wider">Machine Reserve</p>
                                        <span className="text-[10px] font-bold text-slate-400">{formatCurrency(calc.machineReserve)}</span>
                                    </div>
                                    <div className="relative">
                                        <input 
                                            type="number" 
                                            placeholder="5"
                                            className="w-full pr-8 p-2 bg-slate-50 border border-slate-200 rounded outline-none focus:ring-2 focus:ring-indigo-500 text-lg font-bold text-indigo-700"
                                            value={orderData.machineReservePercent}
                                            onFocus={(e) => e.target.select()}
                                            onChange={(e) => updateOrder('machineReservePercent', e.target.value)}
                                        />
                                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">%</span>
                                    </div>
                                    <p className="text-[10px] text-slate-400 mt-1">Applied to total order subtotal.</p>
                                </div>
                                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm text-white">
                                    <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Total to Set Aside</p>
                                    <p className="text-2xl font-black text-amber-400">{formatCurrency(calc.totalRestockAndMachineFund)}</p>
                                    <p className="text-[10px] text-slate-300 mt-1">Deducted directly from Net Profit.</p>
                                </div>
                            </div>
                        </div>

                        <h3 className="text-sm font-bold text-slate-800 border-b pb-2 mb-4 uppercase tracking-wider">Line Item Analysis</h3>
                        <div className="space-y-6">
                            {calc.items.map((item, idx) => {
                                const sizeStr = getSizeString(item);
                                return (
                                <div key={item.id} className="bg-slate-50 border border-slate-200 rounded-lg p-4">
                                    <div className="flex justify-between items-start mb-2 border-b border-slate-200 pb-2">
                                        <div>
                                            <h4 className="font-bold text-slate-800">{idx + 1}. {item.name || 'Unnamed Item'} (Qty: {item.calculatedQty})</h4>
                                            {sizeStr && <p className="text-[10px] font-bold text-slate-500 mt-0.5">{sizeStr}</p>}
                                        </div>
                                        <span className="font-bold text-indigo-700">{formatCurrency(item.lineTotal)} Retail</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-sm text-slate-600">
                                        <div className="flex justify-between">
                                            <span>Landed Cost /ea:</span>
                                            <span className="font-medium text-slate-800">{formatCurrency(item.landedCost)}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>Garment Retail /ea:</span>
                                            <span className="font-medium text-slate-800">{formatCurrency(item.clientGarmentPrice)}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>Garment Profit /ea:</span>
                                            <span className="font-bold text-emerald-600">{formatCurrency(item.clientGarmentPrice - item.landedCost)}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>Deco Revenue /ea:</span>
                                            <span className="font-bold text-indigo-600">{formatCurrency(item.itemDecoPerPiece)}</span>
                                        </div>
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                </div>
            );

            const renderProposalTab = () => (
                <div id="proposal-view" className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden print-no-shadow print-full-width">
                    <div className="p-8 md:p-10">
                        {/* Header */}
                        <div className="flex justify-between items-start mb-6 border-b-2 border-slate-800 pb-6">
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter text-slate-900">PROPOSAL</h1>
                                <p className="text-slate-500 font-medium mt-1">Date: {new Date().toLocaleDateString()}</p>
                            </div>
                            <div className="text-right">
                                <h2 className="text-xl font-bold text-slate-800">{orderData.customerName || 'Customer Name'}</h2>
                                {orderData.orderName && <p className="text-slate-600">{orderData.orderName}</p>}
                                {orderData.dateRequired && <p className="text-slate-500 text-sm mt-1">Required By: {orderData.dateRequired}</p>}
                            </div>
                        </div>

                        {orderData.orderDescription && (
                            <div className="mb-8 p-4 bg-slate-50 rounded-lg border border-slate-200">
                                <p className="text-sm text-slate-700 whitespace-pre-wrap">{orderData.orderDescription}</p>
                            </div>
                        )}

                        <div className="no-print flex flex-col md:flex-row gap-4 mb-8">
                            <button onClick={() => handlePrint('proposal')} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md flex items-center justify-center gap-2 transition-colors">
                                <Icon name="download" size={20} /> Save as PDF
                            </button>
                            <button onClick={() => window.print()} className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-lg shadow-md flex items-center justify-center gap-2 transition-colors">
                                <Icon name="printer" size={20} /> Mobile Print / Screenshot View
                            </button>
                        </div>

                        {/* Items Table */}
                        <div className="mb-8">
                            <div className="grid grid-cols-12 gap-4 border-b border-slate-300 pb-2 mb-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                                <div className="col-span-6">Description</div>
                                <div className="col-span-2 text-center">Qty</div>
                                <div className="col-span-2 text-right">Price</div>
                                <div className="col-span-2 text-right">Total</div>
                            </div>
                            
                            {calc.items.map((item) => {
                                const sizeStr = getSizeString(item);
                                return (
                                <div key={item.id} className="mb-4 pb-4 border-b border-slate-100 last:border-0">
                                    <div className="grid grid-cols-12 gap-4 items-start">
                                        <div className="col-span-6">
                                            <p className="font-bold text-slate-800 text-lg">
                                                {item.name || 'Garment Item'}
                                                {item.validPlacementCount > 0 && (
                                                    <span className="text-sm font-normal text-slate-500 ml-2">({item.validPlacementCount} Placement{item.validPlacementCount !== 1 ? 's' : ''})</span>
                                                )}
                                            </p>
                                            {sizeStr && (
                                                <p className="mt-1"><span className="text-[10px] bg-slate-100 border border-slate-200 text-slate-600 px-2.5 py-0.5 rounded-full font-bold">{sizeStr}</span></p>
                                            )}
                                            <div className="mt-2 pl-3 border-l-2 border-indigo-200 space-y-1">
                                                {item.processedLocations.filter(l => l.type !== 'none').map((loc, i) => (
                                                    <p key={i} className="text-sm text-slate-600">
                                                        <span className="font-semibold text-slate-700">
                                                            {loc.type === 'embroidery' ? (loc.isPuff ? '3D Puff Embroidery' : 'Standard Embroidery') : 'DTF Print'}
                                                        </span>
                                                        {loc.desc ? ` - ${loc.desc}` : ''}
                                                        {(parseFloat(loc.adjustment) < 0) && (
                                                            <span className="text-emerald-600 font-medium italic ml-1 text-[11px]">
                                                                (Includes {formatCurrency(Math.abs(parseFloat(loc.adjustment)))} Discount each Item)
                                                            </span>
                                                        )}
                                                    </p>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="col-span-2 text-center font-semibold text-slate-700 pt-1">{item.calculatedQty}</div>
                                        <div className="col-span-2 text-right font-semibold text-slate-700 pt-1">{formatCurrency(item.lineTotalPerPiece)}</div>
                                        <div className="col-span-2 text-right font-bold text-slate-900 pt-1">{formatCurrency(item.lineTotal)}</div>
                                    </div>
                                </div>
                            )})}
                        </div>

                        {/* Totals Section */}
                        <div className="w-full md:w-1/2 ml-auto space-y-3 text-sm">
                            {(calc.setup > 0 || calc.digitizing > 0) && (
                                <div className="flex justify-between text-slate-600">
                                    <span>Setup & Digitizing</span>
                                    <span className="font-semibold">{formatCurrency(calc.setup + calc.digitizing)}</span>
                                </div>
                            )}
                            
                            <div className="flex justify-between text-slate-800 font-medium pt-2 border-t border-slate-200">
                                <span>Subtotal</span>
                                <span>{formatCurrency(calc.subtotal)}</span>
                            </div>

                            {calc.discount > 0 && (
                                <div className="flex justify-between text-emerald-600 font-medium">
                                    <span>Discount Applied</span>
                                    <span>-{formatCurrency(calc.discount)}</span>
                                </div>
                            )}

                            <div className="flex justify-between text-slate-600">
                                <span>Tax ({orderData.taxRate}%)</span>
                                <span>{formatCurrency(calc.tax)}</span>
                            </div>

                            <div className="flex justify-between items-end pt-4 border-t-2 border-slate-800">
                                <span className="font-black text-slate-900 uppercase tracking-widest">Total</span>
                                <span className="font-black text-3xl text-indigo-700">{formatCurrency(calc.grandTotal)}</span>
                            </div>

                            {calc.totalSavingsDisplay > 0 && (
                                <div className="mt-4 bg-emerald-50 border border-emerald-200 p-3 rounded-lg flex justify-between items-center text-emerald-700">
                                    <span className="font-bold uppercase tracking-wider text-xs">Total Order Savings</span>
                                    <span className="font-black text-lg">{formatCurrency(calc.totalSavingsDisplay)}</span>
                                </div>
                            )}

                            <div className="mt-6 bg-slate-50 p-4 rounded-lg text-center border border-slate-200">
                                <p className="text-slate-500 font-semibold text-xs uppercase tracking-wider mb-1">Deposit Required to Begin</p>
                                <p className="text-xl font-bold text-slate-800">{formatCurrency(calc.deposit)}</p>
                            </div>
                        </div>
                        
                        <div className="mt-12 pt-6 border-t border-slate-200 text-center">
                            <p className="text-slate-500 text-sm font-medium italic">* Quotes are good for 14 days from the date of issue.</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-content">
                    {/* App Header (Hidden on Print) */}
                    <div className="bg-gradient-to-r from-indigo-800 to-slate-900 text-white p-4 shadow-lg sticky top-0 z-20 no-print">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-extrabold flex items-center gap-2 tracking-tight">
                                    <Icon name="layers" size={24} className="text-indigo-400"/>
                                    Hybrid Quoter Pro
                                </h1>
                            </div>
                            <div className="hidden md:flex items-center gap-6">
                                <div className="text-right">
                                    <p className="text-xs text-emerald-400 font-bold uppercase tracking-wider">Est. Profit ({calc.totalMarginPercent.toFixed(1)}%)</p>
                                    <p className="font-black text-xl leading-none text-white">{formatCurrency(calc.netProfit)}</p>
                                </div>
                                <div className="text-right border-l border-indigo-700 pl-6">
                                    <p className="text-xs text-indigo-200 font-medium uppercase tracking-wider">Total Quote</p>
                                    <p className="font-black text-xl leading-none">{formatCurrency(calc.grandTotal)}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="p-4 max-w-4xl mx-auto">
                        <div className="slide-fade-enter-active">
                            {activeTab === 'build' && renderBuildTab()}
                            {activeTab === 'internal' && renderInternalTab()}
                            {activeTab === 'proposal' && renderProposalTab()}
                        </div>
                    </div>

                    {/* Bottom Navigation (Hidden on Print) */}
                    <div className="fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-30 no-print pb-nav">
                        <div className="max-w-4xl mx-auto flex h-16">
                            <button 
                                className={`flex-1 flex flex-col items-center justify-center gap-1 font-semibold text-[11px] transition-colors ${activeTab === 'build' ? 'text-indigo-600 bg-indigo-50/50' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}
                                onClick={() => setActiveTab('build')}
                            >
                                <Icon name="calculator" size={20} /> Builder
                            </button>
                            
                            <button 
                                className={`flex-1 flex flex-col items-center justify-center gap-1 font-semibold text-[11px] border-x border-slate-100 transition-colors ${activeTab === 'internal' ? 'text-emerald-600 bg-emerald-50/50' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}
                                onClick={() => setActiveTab('internal')}
                            >
                                <Icon name="eye" size={20} /> Internal
                            </button>

                            <button 
                                className={`flex-1 flex flex-col items-center justify-center gap-1 font-semibold text-[11px] transition-colors ${activeTab === 'proposal' ? 'text-indigo-600 bg-indigo-50/50' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}
                                onClick={() => setActiveTab('proposal')}
                            >
                                <Icon name="fileText" size={20} /> Proposal
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
